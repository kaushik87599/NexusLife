services:
  frontend:
    build:
      context: ./frontend
    ports:
      - "3000:3000"
    environment:
      - NODE_ENV=development
    volumes:
      - ./frontend:/usr/src/app
      - /usr/src/app/node_modules
      - /usr/src/app/.next
    depends_on:
      - backend
    develop:
      watch:
        - path: ./frontend
          target: /usr/src/app
          action: sync

        - path: ./frontend/package.json
          action: rebuild

        - path: ./frontend/package-lock.json
          action: rebuild

  backend:
    build:
      context: ./backend
    ports:
      - "3001:3001"
    env_file:
      - ./backend/.env
    volumes:
      - ./backend:/app
    depends_on:
      db:
        condition: service_started
      redis:
        condition: service_started
    command: uvicorn app.main:app --host 0.0.0.0 --port 3001 --reload
    develop:
      watch:
        - path: ./backend
          target: /app
          action: sync

        - path: ./backend/requirements.txt
          action: rebuild
        
  db:
    image: postgres:15
    container_name: nexuslife_db
    restart: always
    env_file:
      - ./backend/.env
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7
    container_name: nexuslife_redis
    ports:
      - "6379:6379"

volumes:
  postgres_data:
